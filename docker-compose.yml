version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: telemetry_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: dashboard
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data:
